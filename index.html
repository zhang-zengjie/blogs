    // 初始化 Mermaid（必须在使用前初始化）
    if (typeof mermaid !== 'undefined') {
      mermaid.initialize({ 
        startOnLoad: false, 
        theme: 'default',
        securityLevel: 'loose'
      });
    }
    
    // 初始化博客加载器
    const blogLoader = new MarkdownLoader({
      contentContainerId: 'blog-content',
      listContainerId: 'blog-list',
      indexUrl: 'blogs/index.json',
      contentType: 'blog',
      enableMath: true,      // 启用数学公式

    });
    
    blogLoader.init();
